name: Update Emoji Index

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Emoji/**'

jobs:
  update-emoji-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate emoji-index.json (robust Node.js version)
        run: |
          node -e '
            const fs = require("fs");
            const path = require("path");

            const emojiDir = "Emoji";
            const indexFile = "emoji-index.json";

            const emojis = {};
            function scan(dir) {
              const files = fs.readdirSync(dir);
              for (const file of files) {
                const fullPath = path.join(dir, file);
                if (fs.statSync(fullPath).isDirectory()) {
                  scan(fullPath);
                } else if (/\.(png|jpe?g|gif)$/i.test(file)) {
                  const slug = file.replace(/\.[^.]+$/, "").toLowerCase();
                  const url = `https://raw.githubusercontent.com/${process.env.GITHUB_REPOSITORY}/main/${fullPath}`;
                  emojis[slug] = url;
                }
              }
            }

            scan(emojiDir);

            const data = {
              lastUpdated: new Date().toISOString(),
              emojis: emojis
            };

            fs.writeFileSync(indexFile, JSON.stringify(data, null, 2));
            console.log(`Generated emoji-index.json with ${Object.keys(emojis).length} emojis`);
          '

      - name: Commit emoji-index.json if changed
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: update emoji index"
          file_pattern: emoji-index.json
          branch: main
