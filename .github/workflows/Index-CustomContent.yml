name: Update Asset Indexes

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Emoji/**'
      - 'Gifs/**'
  workflow_dispatch:

jobs:
  update-indexes:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Indexes
        run: |
          node -e '
            const fs = require("fs");
            const path = require("path");

            const repo = process.env.GITHUB_REPOSITORY;

            function generateIndex(sourceDir, outputFile) {
              if (!fs.existsSync(sourceDir)) {
                console.log(`Skipping ${sourceDir}: Directory not found.`);
                return;
              }

              const assets = {};
              function scan(dir) {
                const files = fs.readdirSync(dir);
                for (const file of files) {
                  const fullPath = path.join(dir, file);
                  if (fs.statSync(fullPath).isDirectory()) {
                    scan(fullPath);
                  } else if (/\.(png|jpe?g|gif|webp)$/i.test(file)) {
                    const slug = file.replace(/\.[^.]+$/, "").toLowerCase();
                    const githubPath = fullPath.split(path.sep).join("/");
                    assets[slug] = `https://raw.githubusercontent.com/${repo}/main/${githubPath}`;
                  }
                }
              }

              scan(sourceDir);

              const data = {
                lastUpdated: new Date().toISOString(),
                total: Object.keys(assets).length,
                assets: assets
              };

              fs.writeFileSync(outputFile, JSON.stringify(data, null, 2));
              console.log(`Generated ${outputFile} with ${data.total} items.`);
            }

            // Run for both directories
            generateIndex("Emoji", "emoji-index.json");
            generateIndex("Gifs", "gif-index.json");
          '

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "[Action] Update custom emoji and gifs"
          # This pattern catches any JSON file in the root
          file_pattern: '*-index.json'
